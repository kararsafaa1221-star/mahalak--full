<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>محلك | Mahalak - منصة المتاجر المحلية العراقية</title>
    <meta name="description" content="منصة محلك - نظام رقمي متكامل يربط المتاجر المحلية بالزبائن داخل العراق. سجل متجرك مجاناً واستقبل الطلبات!" />
    <link rel="icon" type="image/png" href="./icon.png" />
    <link rel="apple-touch-icon" href="./icon.png" />
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#6B21A8" />
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script type="module" crossorigin src="./assets/index-BiHyW1_U.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CcyDk2hy.css">
  </head>
  <body>
    <div id="error-container" style="color: red; padding: 20px; font-family: monospace; display: none;"></div>
    <script>
      window.addEventListener('error', function(e) {
        var msg = e.message || '';
        if (msg.toLowerCase().indexOf('websocket') !== -1 || msg.toLowerCase().indexOf('vite') !== -1 || msg.toLowerCase().indexOf('hmr') !== -1) return;
        document.getElementById('error-container').style.display = 'block';
        document.getElementById('error-container').innerText += '\n' + e.message + ' at ' + e.filename + ':' + e.lineno;
      });
      window.addEventListener('unhandledrejection', function(e) {
        var reasonStr = '';
        if (e.reason) {
          if (e.reason.stack) reasonStr = e.reason.stack;
          else if (e.reason.message) reasonStr = e.reason.message;
          else reasonStr = e.reason.toString();
        }
        var lowerReason = reasonStr.toLowerCase();
        if (lowerReason.indexOf('websocket') !== -1 || lowerReason.indexOf('vite') !== -1 || lowerReason.indexOf('hmr') !== -1) return;
        document.getElementById('error-container').style.display = 'block';
        document.getElementById('error-container').innerText += '\nUnhandled Promise: ' + reasonStr;
      });
    </script>
    <div id="root"></div>

  </body>
</html>
